<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin – sam.</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="fonts.css">
  <style>
    :root {
      --bg:      #050508;
      --s1:      #0b0b10;
      --s2:      #111118;
      --text:    #f2f0fa;
      --muted:   #64617a;
      --acc:     #b8ff00;
      --acc-dim: rgba(184,255,0,.08);
      --border:  rgba(255,255,255,.065);
      --r:       6px;
      --red:     #ef4444;
      --green:   #22c55e;
      --yellow:  #eab308;
      --blue:    #3b82f6;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior: smooth; }
    body { font-family:'Epilogue',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; line-height:1.5; }
    a { color:inherit; text-decoration:none; }
    ul { list-style:none; }
    button { cursor:pointer; font-family:inherit; }
    input, textarea, select { font-family:inherit; }

    /* ── Login ── */
    #loginScreen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-box {
      width: 100%;
      max-width: 360px;
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 48px 40px;
    }
    .login-logo {
      font-family:'Unbounded',sans-serif;
      font-weight:700;
      font-size:1.1rem;
      margin-bottom:8px;
    }
    .login-logo span { color:var(--acc); }
    .login-box p { font-family:'Fira Mono',monospace; font-size:.72rem; color:var(--muted); margin-bottom:36px; letter-spacing:.04em; }
    .login-box label { display:block; font-family:'Fira Mono',monospace; font-size:.68rem; color:var(--muted); text-transform:uppercase; letter-spacing:.1em; margin-bottom:8px; }
    .login-box input {
      width:100%; background:var(--s2); border:1px solid var(--border); border-radius:var(--r);
      padding:12px 16px; color:var(--text); font-size:.95rem; outline:none; transition:border-color .2s; margin-bottom:20px;
    }
    .login-box input:focus { border-color:rgba(184,255,0,.5); }
    .login-err { font-size:.8rem; color:var(--red); margin-bottom:14px; display:none; }
    .btn-acc {
      width:100%; background:var(--acc); color:var(--bg);
      font-family:'Unbounded',sans-serif; font-weight:700; font-size:.72rem;
      letter-spacing:.05em; text-transform:uppercase;
      border:none; border-radius:var(--r); padding:13px; transition:opacity .2s;
    }
    .btn-acc:hover { opacity:.85; }

    /* ── App ── */
    #app { display:none; min-height:100vh; }

    /* Top nav */
    .a-nav {
      position:sticky; top:0; z-index:50;
      background:rgba(5,5,8,.9); backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);
      padding:0 32px; height:60px;
      display:flex; align-items:center; justify-content:space-between;
    }
    .a-nav-logo { font-family:'Unbounded',sans-serif; font-weight:700; font-size:.95rem; }
    .a-nav-logo span { color:var(--acc); }
    .a-nav-right { display:flex; align-items:center; gap:16px; }
    .a-nav-tag { font-family:'Fira Mono',monospace; font-size:.68rem; color:var(--muted); border:1px solid var(--border); padding:4px 12px; border-radius:100px; letter-spacing:.06em; }
    .btn-logout { background:none; border:1px solid var(--border); border-radius:var(--r); padding:6px 14px; font-family:'Fira Mono',monospace; font-size:.68rem; color:var(--muted); transition:color .2s, border-color .2s; }
    .btn-logout:hover { color:var(--red); border-color:var(--red); }

    /* Main */
    .a-main { max-width:1200px; margin:0 auto; padding:40px 32px; }

    /* Stats */
    .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:40px; }
    .stat-card { background:var(--s1); border:1px solid var(--border); border-radius:var(--r); padding:24px; }
    .stat-card .sc-label { font-family:'Fira Mono',monospace; font-size:.68rem; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; margin-bottom:10px; }
    .stat-card .sc-val { font-family:'Unbounded',sans-serif; font-weight:900; font-size:2rem; letter-spacing:-.04em; line-height:1; }
    .stat-card .sc-val.acc { color:var(--acc); }
    .stat-card .sc-val.green { color:var(--green); }
    .stat-card .sc-val.yellow { color:var(--yellow); }

    /* Toolbar */
    .toolbar { display:flex; align-items:center; gap:12px; margin-bottom:24px; flex-wrap:wrap; }
    .search-wrap { position:relative; flex:1; min-width:200px; }
    .search-wrap svg { position:absolute; left:12px; top:50%; transform:translateY(-50%); width:14px; height:14px; color:var(--muted); pointer-events:none; }
    .search-wrap input { width:100%; background:var(--s1); border:1px solid var(--border); border-radius:var(--r); padding:10px 12px 10px 36px; color:var(--text); font-size:.88rem; outline:none; transition:border-color .2s; }
    .search-wrap input:focus { border-color:rgba(184,255,0,.4); }
    .filter-sel { background:var(--s1); border:1px solid var(--border); border-radius:var(--r); padding:10px 14px; color:var(--muted); font-family:'Fira Mono',monospace; font-size:.72rem; outline:none; transition:border-color .2s; }
    .filter-sel:focus { border-color:rgba(184,255,0,.4); color:var(--text); }
    .btn-add { display:flex; align-items:center; gap:8px; background:var(--acc); color:var(--bg); font-family:'Unbounded',sans-serif; font-weight:700; font-size:.68rem; letter-spacing:.06em; text-transform:uppercase; border:none; border-radius:var(--r); padding:10px 20px; transition:opacity .2s; white-space:nowrap; }
    .btn-add:hover { opacity:.85; }
    .btn-export { display:flex; align-items:center; gap:6px; background:var(--s1); border:1px solid var(--border); border-radius:var(--r); padding:10px 16px; color:var(--muted); font-family:'Fira Mono',monospace; font-size:.68rem; letter-spacing:.04em; transition:color .2s, border-color .2s; white-space:nowrap; }
    .btn-export:hover { color:var(--acc); border-color:rgba(184,255,0,.4); }

    /* Table */
    .table-wrap { background:var(--s1); border:1px solid var(--border); border-radius:var(--r); overflow:hidden; }
    table { width:100%; border-collapse:collapse; }
    thead { background:var(--s2); }
    th { font-family:'Fira Mono',monospace; font-size:.65rem; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; padding:14px 20px; text-align:left; border-bottom:1px solid var(--border); white-space:nowrap; }
    td { padding:16px 20px; border-bottom:1px solid var(--border); font-size:.875rem; vertical-align:middle; }
    tr:last-child td { border-bottom:none; }
    tbody tr { transition:background .15s; }
    tbody tr:hover { background:rgba(255,255,255,.02); }
    .td-name { font-weight:500; }
    .td-email { font-family:'Fira Mono',monospace; font-size:.75rem; color:var(--muted); }
    .td-phone { font-family:'Fira Mono',monospace; font-size:.75rem; color:var(--muted); }
    .td-amount { font-family:'Unbounded',sans-serif; font-size:.85rem; font-weight:700; }
    .td-actions { display:flex; gap:8px; }
    .btn-edit, .btn-del {
      border:none; border-radius:4px; padding:5px 12px;
      font-family:'Fira Mono',monospace; font-size:.68rem; letter-spacing:.04em;
      transition:opacity .2s;
    }
    .btn-edit { background:var(--acc-dim); color:var(--acc); }
    .btn-del  { background:rgba(239,68,68,.1); color:var(--red); }
    .btn-edit:hover, .btn-del:hover { opacity:.75; }

    /* Status badge */
    .badge {
      display:inline-block; font-family:'Fira Mono',monospace; font-size:.65rem;
      padding:3px 10px; border-radius:100px; letter-spacing:.05em; white-space:nowrap;
    }
    .badge-angebot  { background:rgba(59,130,246,.15);  color:var(--blue); }
    .badge-arbeit   { background:rgba(234,179,8,.15);   color:var(--yellow); }
    .badge-review   { background:rgba(184,255,0,.1);    color:var(--acc); }
    .badge-fertig   { background:rgba(34,197,94,.15);   color:var(--green); }
    .badge-pausiert { background:rgba(100,97,122,.15);  color:var(--muted); }

    .paid-yes { color:var(--green); font-family:'Fira Mono',monospace; font-size:.72rem; }
    .paid-no  { color:var(--yellow); font-family:'Fira Mono',monospace; font-size:.72rem; }

    /* Empty state */
    .empty { text-align:center; padding:80px 20px; }
    .empty p { color:var(--muted); font-family:'Fira Mono',monospace; font-size:.8rem; margin-top:12px; letter-spacing:.04em; }

    /* Modal */
    .modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.75); backdrop-filter:blur(4px);
      z-index:200; display:none; align-items:center; justify-content:center; padding:24px;
    }
    .modal-overlay.open { display:flex; }
    .modal {
      background:var(--s1); border:1px solid var(--border); border-radius:12px;
      width:100%; max-width:600px; max-height:90vh; overflow-y:auto;
      padding:40px;
    }
    .modal-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:32px; }
    .modal-head h2 { font-size:1.2rem; }
    .btn-close { background:none; border:none; color:var(--muted); font-size:1.4rem; line-height:1; transition:color .2s; }
    .btn-close:hover { color:var(--text); }
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .form-grid .full { grid-column:1/-1; }
    .f-group { display:flex; flex-direction:column; gap:6px; }
    .f-group label { font-family:'Fira Mono',monospace; font-size:.65rem; color:var(--muted); text-transform:uppercase; letter-spacing:.1em; }
    .f-group input, .f-group select, .f-group textarea {
      background:var(--s2); border:1px solid var(--border); border-radius:var(--r);
      padding:11px 14px; color:var(--text); font-size:.88rem; outline:none; transition:border-color .2s; resize:vertical;
    }
    .f-group input:focus, .f-group select:focus, .f-group textarea:focus { border-color:rgba(184,255,0,.5); }
    .f-group select option { background:var(--s2); }
    .modal-foot { display:flex; justify-content:flex-end; gap:12px; margin-top:28px; }
    .btn-cancel { background:none; border:1px solid var(--border); border-radius:var(--r); padding:10px 22px; color:var(--muted); font-size:.85rem; transition:color .2s, border-color .2s; }
    .btn-cancel:hover { color:var(--text); border-color:rgba(255,255,255,.2); }
    .btn-save { background:var(--acc); color:var(--bg); font-family:'Unbounded',sans-serif; font-weight:700; font-size:.68rem; letter-spacing:.06em; text-transform:uppercase; border:none; border-radius:var(--r); padding:10px 24px; transition:opacity .2s; }
    .btn-save:hover { opacity:.85; }

    /* Notes expand */
    .td-note { font-size:.8rem; color:var(--muted); max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

    /* Responsive */
    @media(max-width:900px) {
      .stats-row { grid-template-columns:1fr 1fr; }
      .a-main { padding:24px 20px; }
      .a-nav { padding:0 20px; }
      th:nth-child(3), td:nth-child(3),
      th:nth-child(6), td:nth-child(6) { display:none; }
    }
    @media(max-width:600px) {
      .stats-row { grid-template-columns:1fr 1fr; }
      .form-grid { grid-template-columns:1fr; }
      .form-grid .full { grid-column:1; }
      .modal { padding:28px 20px; }
      th:nth-child(4), td:nth-child(4) { display:none; }
    }
  </style>
</head>
<body>

  <!-- Login -->
  <div id="loginScreen">
    <div class="login-box">
      <div class="login-logo">sam<span>.</span> admin</div>
      <p>Kundenverwaltung</p>
      <label for="pw">Passwort</label>
      <input type="password" id="pw" placeholder="••••••••" autocomplete="current-password">
      <div class="login-err" id="loginErr">Falsches Passwort.</div>
      <button class="btn-acc" id="loginBtn">Einloggen →</button>
    </div>
  </div>

  <!-- App -->
  <div id="app">
    <nav class="a-nav">
      <div class="a-nav-logo">sam<span>.</span> admin</div>
      <div class="a-nav-right">
        <span class="a-nav-tag">Kundenverwaltung</span>
        <button class="btn-logout" id="logoutBtn">Logout</button>
      </div>
    </nav>

    <main class="a-main">
      <!-- Stats -->
      <div class="stats-row" id="statsRow">
        <div class="stat-card">
          <div class="sc-label">Kunden gesamt</div>
          <div class="sc-val acc" id="statTotal">0</div>
        </div>
        <div class="stat-card">
          <div class="sc-label">Aktive Projekte</div>
          <div class="sc-val yellow" id="statActive">0</div>
        </div>
        <div class="stat-card">
          <div class="sc-label">Umsatz gesamt</div>
          <div class="sc-val green" id="statRevenue">0 €</div>
        </div>
        <div class="stat-card">
          <div class="sc-label">Ausstehend</div>
          <div class="sc-val" id="statOpen" style="color:var(--red)">0 €</div>
        </div>
      </div>

      <!-- Toolbar -->
      <div class="toolbar">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" placeholder="Kunde suchen…">
        </div>
        <select class="filter-sel" id="filterStatus">
          <option value="">Alle Status</option>
          <option value="angebot">Angebot</option>
          <option value="in-arbeit">In Arbeit</option>
          <option value="review">Review</option>
          <option value="fertig">Fertig</option>
          <option value="pausiert">Pausiert</option>
        </select>
        <select class="filter-sel" id="filterPaid">
          <option value="">Alle</option>
          <option value="false">Offen</option>
          <option value="true">Bezahlt</option>
        </select>
        <button class="btn-add" id="addBtn">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Kunde hinzufügen
        </button>
        <button class="btn-export" id="exportCsvBtn" title="Als CSV exportieren">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          CSV
        </button>
        <button class="btn-export" id="exportJsonBtn" title="Als JSON exportieren">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          JSON
        </button>
      </div>

      <!-- Table -->
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Kontakt</th>
              <th>Paket</th>
              <th>Status</th>
              <th>Betrag</th>
              <th>Notiz</th>
              <th>Aktionen</th>
            </tr>
          </thead>
          <tbody id="clientTable"></tbody>
        </table>
        <div class="empty" id="emptyState" style="display:none">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--muted);margin:0 auto;display:block"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <p>Noch keine Kunden. Klick auf "Kunde hinzufügen".</p>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-head">
        <h2 id="modalTitle">Neuer Kunde</h2>
        <button class="btn-close" id="modalClose">×</button>
      </div>
      <form id="clientForm">
        <div class="form-grid">
          <div class="f-group">
            <label>Vorname</label>
            <input type="text" id="fVorname" placeholder="Max" required>
          </div>
          <div class="f-group">
            <label>Nachname</label>
            <input type="text" id="fNachname" placeholder="Mustermann" required>
          </div>
          <div class="f-group">
            <label>E-Mail</label>
            <input type="email" id="fEmail" placeholder="max@beispiel.de" required>
          </div>
          <div class="f-group">
            <label>Telefon</label>
            <input type="tel" id="fTelefon" placeholder="+49 123 456789">
          </div>
          <div class="f-group full">
            <label>Adresse</label>
            <input type="text" id="fAdresse" placeholder="Musterstraße 1, 12345 Musterstadt">
          </div>
          <div class="f-group">
            <label>Paket</label>
            <select id="fPaket">
              <option value="Website (799 €)">Website (799 €)</option>
              <option value="Hosting Add-on (19 €/Monat)">Hosting Add-on (19 €/Monat)</option>
              <option value="Website + Hosting">Website + Hosting</option>
              <option value="Custom">Custom</option>
            </select>
          </div>
          <div class="f-group">
            <label>Projektstatus</label>
            <select id="fStatus">
              <option value="angebot">Angebot</option>
              <option value="in-arbeit">In Arbeit</option>
              <option value="review">Review</option>
              <option value="fertig">Fertig</option>
              <option value="pausiert">Pausiert</option>
            </select>
          </div>
          <div class="f-group">
            <label>Betrag (€)</label>
            <input type="number" id="fBetrag" placeholder="799" min="0" step="0.01">
          </div>
          <div class="f-group">
            <label>Zahlung</label>
            <select id="fBezahlt">
              <option value="false">Offen</option>
              <option value="true">Bezahlt</option>
            </select>
          </div>
          <div class="f-group full">
            <label>Notizen</label>
            <textarea id="fNotizen" rows="3" placeholder="Projektdetails, Wünsche, Deadlines…"></textarea>
          </div>
        </div>
        <div class="modal-foot">
          <button type="button" class="btn-cancel" id="modalCancel">Abbrechen</button>
          <button type="submit" class="btn-save">Speichern</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    /* ── Passwort ── */
    /* Passwort hier ändern: */
    const PASSWORD = 'sam2026';

    const loginScreen = document.getElementById('loginScreen');
    const app         = document.getElementById('app');
    const pwInput     = document.getElementById('pw');
    const loginErr    = document.getElementById('loginErr');

    function checkSession() {
      if (sessionStorage.getItem('admin_auth') === '1') showApp();
    }
    checkSession();

    document.getElementById('loginBtn').addEventListener('click', login);
    pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

    function login() {
      if (pwInput.value === PASSWORD) {
        sessionStorage.setItem('admin_auth', '1');
        showApp();
      } else {
        loginErr.style.display = 'block';
        pwInput.value = '';
        pwInput.focus();
      }
    }
    function showApp() {
      loginScreen.style.display = 'none';
      app.style.display = 'block';
      renderAll();
    }
    document.getElementById('logoutBtn').addEventListener('click', () => {
      sessionStorage.removeItem('admin_auth');
      location.reload();
    });

    /* ── Datenspeicherung ── */
    function load() { return JSON.parse(localStorage.getItem('sam_clients') || '[]'); }
    function save(data) { localStorage.setItem('sam_clients', JSON.stringify(data)); }
    function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

    /* ── Render ── */
    const statusLabel = { angebot:'Angebot', 'in-arbeit':'In Arbeit', review:'Review', fertig:'Fertig', pausiert:'Pausiert' };
    const statusClass = { angebot:'badge-angebot', 'in-arbeit':'badge-arbeit', review:'badge-review', fertig:'badge-fertig', pausiert:'badge-pausiert' };

    function renderAll() {
      const clients = load();
      const q       = document.getElementById('searchInput').value.toLowerCase();
      const fs      = document.getElementById('filterStatus').value;
      const fp      = document.getElementById('filterPaid').value;

      const filtered = clients.filter(c => {
        const name = (c.vorname + ' ' + c.nachname).toLowerCase();
        if (q && !name.includes(q) && !c.email.toLowerCase().includes(q)) return false;
        if (fs && c.status !== fs) return false;
        if (fp !== '' && String(c.bezahlt) !== fp) return false;
        return true;
      });

      renderStats(clients);
      renderTable(filtered);
    }

    function renderStats(clients) {
      const total   = clients.length;
      const active  = clients.filter(c => c.status === 'in-arbeit' || c.status === 'review').length;
      const revenue = clients.filter(c => c.status === 'fertig' && c.bezahlt).reduce((s,c) => s + (Number(c.betrag)||0), 0);
      const open    = clients.filter(c => c.status === 'fertig' && !c.bezahlt).reduce((s,c) => s + (Number(c.betrag)||0), 0);
      document.getElementById('statTotal').textContent   = total;
      document.getElementById('statActive').textContent  = active;
      document.getElementById('statRevenue').textContent = revenue.toLocaleString('de-DE') + ' €';
      document.getElementById('statOpen').textContent    = open.toLocaleString('de-DE') + ' €';
    }

    function renderTable(clients) {
      const tbody = document.getElementById('clientTable');
      const empty = document.getElementById('emptyState');
      tbody.innerHTML = '';
      if (!clients.length) { empty.style.display = 'block'; return; }
      empty.style.display = 'none';
      clients.forEach(c => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>
            <div class="td-name">${esc(c.vorname)} ${esc(c.nachname)}</div>
          </td>
          <td>
            <div class="td-email">${esc(c.email)}</div>
            <div class="td-phone">${esc(c.telefon||'—')}</div>
          </td>
          <td><span style="font-size:.8rem;color:var(--muted)">${esc(c.paket||'—')}</span></td>
          <td><span class="badge ${statusClass[c.status]||''}">${statusLabel[c.status]||c.status}</span></td>
          <td>
            <div class="td-amount">${c.betrag ? Number(c.betrag).toLocaleString('de-DE') + ' €' : '—'}</div>
            <div class="${c.bezahlt ? 'paid-yes' : 'paid-no'}">${c.bezahlt ? '✓ Bezahlt' : '⏳ Offen'}</div>
          </td>
          <td><div class="td-note">${esc(c.notizen||'—')}</div></td>
          <td>
            <div class="td-actions">
              <button class="btn-edit" onclick="openEdit('${c.id}')">Bearbeiten</button>
              <button class="btn-del"  onclick="deleteClient('${c.id}')">Löschen</button>
            </div>
          </td>`;
        tbody.appendChild(tr);
      });
    }

    function esc(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    /* ── Search/Filter ── */
    document.getElementById('searchInput').addEventListener('input', renderAll);
    document.getElementById('filterStatus').addEventListener('change', renderAll);
    document.getElementById('filterPaid').addEventListener('change', renderAll);

    /* ── Modal ── */
    let editId = null;
    const overlay = document.getElementById('modalOverlay');

    document.getElementById('addBtn').addEventListener('click', () => openModal());
    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('modalCancel').addEventListener('click', closeModal);
    overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });

    function openModal(id) {
      editId = id || null;
      document.getElementById('modalTitle').textContent = id ? 'Kunde bearbeiten' : 'Neuer Kunde';
      const form = document.getElementById('clientForm');
      form.reset();
      if (id) {
        const c = load().find(x => x.id === id);
        if (!c) return;
        document.getElementById('fVorname').value  = c.vorname  || '';
        document.getElementById('fNachname').value = c.nachname || '';
        document.getElementById('fEmail').value    = c.email    || '';
        document.getElementById('fTelefon').value  = c.telefon  || '';
        document.getElementById('fAdresse').value  = c.adresse  || '';
        document.getElementById('fPaket').value    = c.paket    || '';
        document.getElementById('fStatus').value   = c.status   || 'angebot';
        document.getElementById('fBetrag').value   = c.betrag   || '';
        document.getElementById('fBezahlt').value  = String(c.bezahlt);
        document.getElementById('fNotizen').value  = c.notizen  || '';
      }
      overlay.classList.add('open');
      document.getElementById('fVorname').focus();
    }
    window.openEdit     = id => openModal(id);
    window.deleteClient = id => {
      if (!confirm('Kunde wirklich löschen?')) return;
      save(load().filter(c => c.id !== id));
      renderAll();
    };
    function closeModal() { overlay.classList.remove('open'); editId = null; }

    document.getElementById('clientForm').addEventListener('submit', e => {
      e.preventDefault();
      const clients = load();
      const entry = {
        id:       editId || uid(),
        vorname:  document.getElementById('fVorname').value.trim(),
        nachname: document.getElementById('fNachname').value.trim(),
        email:    document.getElementById('fEmail').value.trim(),
        telefon:  document.getElementById('fTelefon').value.trim(),
        adresse:  document.getElementById('fAdresse').value.trim(),
        paket:    document.getElementById('fPaket').value,
        status:   document.getElementById('fStatus').value,
        betrag:   document.getElementById('fBetrag').value,
        bezahlt:  document.getElementById('fBezahlt').value === 'true',
        notizen:  document.getElementById('fNotizen').value.trim(),
        erstellt: editId ? (clients.find(x=>x.id===editId)||{}).erstellt || new Date().toISOString() : new Date().toISOString(),
        updated:  new Date().toISOString(),
      };
      if (editId) {
        const i = clients.findIndex(x => x.id === editId);
        if (i > -1) clients[i] = entry;
      } else {
        clients.unshift(entry);
      }
      save(clients);
      closeModal();
      renderAll();
    });

    /* ── Export ── */
    function download(filename, content, mime) {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([content], { type: mime }));
      a.download = filename;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    document.getElementById('exportJsonBtn').addEventListener('click', () => {
      const clients = load();
      if (!clients.length) { alert('Keine Kundendaten vorhanden.'); return; }
      const date = new Date().toISOString().slice(0,10);
      download(`kunden-backup-${date}.json`, JSON.stringify(clients, null, 2), 'application/json');
    });

    document.getElementById('exportCsvBtn').addEventListener('click', () => {
      const clients = load();
      if (!clients.length) { alert('Keine Kundendaten vorhanden.'); return; }
      const cols = ['vorname','nachname','email','telefon','adresse','paket','status','betrag','bezahlt','notizen','erstellt'];
      const head = ['Vorname','Nachname','E-Mail','Telefon','Adresse','Paket','Status','Betrag','Bezahlt','Notizen','Erstellt am'];
      const rows = clients.map(c => cols.map(k => {
        const v = String(c[k] ?? '').replace(/"/g,'""');
        return `"${v}"`;
      }).join(';'));
      const csv = '﻿' + head.join(';') + '\n' + rows.join('\n');
      const date = new Date().toISOString().slice(0,10);
      download(`kunden-backup-${date}.csv`, csv, 'text/csv;charset=utf-8');
    });
  </script>
</body>
</html>
